name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-tests:
    name: Offline tests (no API key)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check the source tree
        run: python -m compileall -q src tests streamlit_app.py

      - name: Generate synthetic data
        run: python -m src.generate_data --n 2000 --out data

      - name: Train Random Forest (claims)
        run: python -m src.train_claims_rf

      - name: Train TensorFlow NN (labs)
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m src.train_labs_nn

      - name: Run pytest (offline only — live tests skip without GOOGLE_API_KEY)
        run: pytest tests/ -v --tb=short

      - name: Surface model AUCs
        run: |
          python - <<'PY'
          import json, pathlib
          for f in ["models/claims_rf_metrics.json", "models/labs_nn_metrics.json"]:
              p = pathlib.Path(f)
              if p.exists():
                  print(f, json.loads(p.read_text()))
          PY
