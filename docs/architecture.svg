<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gradInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="gradAgent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gradParallel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="gradLoop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gradAction" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="500" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Claims-Risk Orchestrator</text>
  <text x="500" y="78" text-anchor="middle" font-size="15" fill="#475569">Multi-agent pipeline on Google ADK — all four primitives, in production order</text>

  <!-- Input -->
  <g filter="url(#softShadow)">
    <rect x="350" y="120" width="300" height="70" rx="10" fill="url(#gradInput)" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="500" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Patient Case</text>
    <text x="500" y="170" text-anchor="middle" font-size="12" fill="#475569">claim · labs · discharge note</text>
  </g>
  <line x1="500" y1="190" x2="500" y2="225" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Router -->
  <g filter="url(#softShadow)">
    <rect x="320" y="230" width="360" height="80" rx="10" fill="url(#gradAgent)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="500" y="257" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">RouterAgent</text>
    <text x="500" y="277" text-anchor="middle" font-size="12" fill="#1e3a8a">LlmAgent · gemini-2.5-flash</text>
    <text x="500" y="295" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">decides which specialists run</text>
  </g>
  <line x1="500" y1="310" x2="500" y2="345" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Parallel cluster header -->
  <rect x="120" y="350" width="760" height="180" rx="14" fill="url(#gradParallel)" fill-opacity="0.35" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="140" y="375" font-size="12" font-weight="700" fill="#0f766e" letter-spacing="0.5">ROUTEDPARALLELAGENT · CUSTOM SUBCLASS</text>

  <!-- Three specialists -->
  <g filter="url(#softShadow)">
    <rect x="150" y="395" width="220" height="115" rx="10" fill="url(#gradParallel)" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="260" y="422" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">ClaimsAgent</text>
    <text x="260" y="442" text-anchor="middle" font-size="11" fill="#0f766e">LlmAgent + FunctionTool</text>
    <line x1="180" y1="455" x2="340" y2="455" stroke="#14b8a6" stroke-opacity="0.4"/>
    <text x="260" y="475" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Random Forest</text>
    <text x="260" y="494" text-anchor="middle" font-size="10" fill="#475569">cost · procedures · LOS · age</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="390" y="395" width="220" height="115" rx="10" fill="url(#gradParallel)" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="500" y="422" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">LabsAgent</text>
    <text x="500" y="442" text-anchor="middle" font-size="11" fill="#0f766e">LlmAgent + FunctionTool</text>
    <line x1="420" y1="455" x2="580" y2="455" stroke="#14b8a6" stroke-opacity="0.4"/>
    <text x="500" y="475" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">TensorFlow DNN</text>
    <text x="500" y="494" text-anchor="middle" font-size="10" fill="#475569">a1c · ldl · egfr · troponin</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="395" width="220" height="115" rx="10" fill="url(#gradParallel)" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="740" y="422" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">NotesAgent</text>
    <text x="740" y="442" text-anchor="middle" font-size="11" fill="#0f766e">LlmAgent (no tool)</text>
    <line x1="660" y1="455" x2="820" y2="455" stroke="#14b8a6" stroke-opacity="0.4"/>
    <text x="740" y="475" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Gemini extraction</text>
    <text x="740" y="494" text-anchor="middle" font-size="10" fill="#475569">severity · red flags · billing</text>
  </g>

  <line x1="500" y1="530" x2="500" y2="565" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Fusion -->
  <g filter="url(#softShadow)">
    <rect x="290" y="570" width="420" height="80" rx="10" fill="url(#gradAgent)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="500" y="597" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">FusionAgent</text>
    <text x="500" y="617" text-anchor="middle" font-size="12" fill="#1e3a8a">context-aware weighting · NOT averaging</text>
    <text x="500" y="635" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">reasons over conflicting signals</text>
  </g>
  <line x1="500" y1="650" x2="500" y2="685" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Review loop -->
  <rect x="180" y="690" width="640" height="240" rx="14" fill="url(#gradLoop)" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="200" y="713" font-size="12" font-weight="700" fill="#92400e" letter-spacing="0.5">REVIEWLOOP · LOOPAGENT · MAX 3 ITER</text>

  <g filter="url(#softShadow)">
    <rect x="220" y="730" width="240" height="80" rx="10" fill="url(#gradLoop)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="340" y="757" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">ReviewerAgent</text>
    <text x="340" y="777" text-anchor="middle" font-size="11" fill="#92400e">LlmAgent · safety rules</text>
    <text x="340" y="794" text-anchor="middle" font-size="10" fill="#475569">passed? failed_rules? escalate?</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="540" y="730" width="240" height="80" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <text x="660" y="757" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">LoopExitChecker</text>
    <text x="660" y="777" text-anchor="middle" font-size="11" fill="#9a3412">BaseAgent · custom</text>
    <text x="660" y="794" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">actions.escalate=True on pass</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="380" y="830" width="240" height="80" rx="10" fill="url(#gradLoop)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="500" y="857" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">RefinerAgent</text>
    <text x="500" y="877" text-anchor="middle" font-size="11" fill="#92400e">LlmAgent · skipped on early exit</text>
    <text x="500" y="894" text-anchor="middle" font-size="10" fill="#475569">rewrites fusion when rules fail</text>
  </g>

  <!-- Loop arrows -->
  <path d="M 460 770 L 540 770" stroke="#92400e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 810 Q 660 870 620 870" stroke="#92400e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 380 870 Q 340 870 340 810" stroke="#92400e" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrowDashed)"/>
  <text x="295" y="858" font-size="10" fill="#475569" font-style="italic">retry</text>

  <line x1="500" y1="930" x2="500" y2="965" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Action -->
  <g filter="url(#softShadow)">
    <rect x="290" y="970" width="420" height="80" rx="10" fill="url(#gradAction)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="500" y="997" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">ActionAgent</text>
    <text x="500" y="1017" text-anchor="middle" font-size="12" fill="#166534">structured JSON · audit log · FunctionTool</text>
    <text x="500" y="1035" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">deterministic mapping to downstream system</text>
  </g>
  <line x1="500" y1="1050" x2="500" y2="1085" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Outputs -->
  <g>
    <rect x="60" y="1090" width="200" height="65" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <text x="160" y="1115" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">AUTO_APPROVE</text>
    <text x="160" y="1135" text-anchor="middle" font-size="10" fill="#475569">→ auto-payment</text>
  </g>
  <g>
    <rect x="280" y="1090" width="200" height="65" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.2"/>
    <text x="380" y="1115" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">ROUTINE_FOLLOWUP</text>
    <text x="380" y="1135" text-anchor="middle" font-size="10" fill="#475569">→ care manager queue</text>
  </g>
  <g>
    <rect x="500" y="1090" width="200" height="65" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
    <text x="600" y="1115" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">FLAG_FOR_AUDIT</text>
    <text x="600" y="1135" text-anchor="middle" font-size="10" fill="#475569">→ SIU audit ticket</text>
  </g>
  <g>
    <rect x="720" y="1090" width="200" height="65" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
    <text x="820" y="1115" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">ESCALATE_TO_HUMAN</text>
    <text x="820" y="1135" text-anchor="middle" font-size="10" fill="#475569">→ human review</text>
  </g>

  <!-- Footer -->
  <text x="500" y="1185" text-anchor="middle" font-size="11" fill="#94a3b8">SequentialAgent · ParallelAgent · LoopAgent · LlmAgent — all four ADK primitives, doing actual work</text>
</svg>
